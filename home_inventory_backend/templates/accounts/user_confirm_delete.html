{% extends 'base.html' %}
{% block title %}Remove User{% endblock %}
{% block page_title %}Remove User{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;">
  <div class="card-body" style="text-align:center;padding:40px;">
    <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
    <h2 style="margin-bottom:8px;">Remove {{ user_obj.full_name() }}?</h2>
    <p class="text-muted mb-3">Withdrawal records will remain but be unlinked.</p>
    <form method="post"><div class="flex-gap" style="justify-content:center;">
        <button type="submit" class="btn btn-danger">Yes, Remove</button>
        <a href="{{ url_for('user_list') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
