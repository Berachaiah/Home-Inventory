<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Home Inventory</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a3c5e">
    <link rel="stylesheet" href="/static/css/preloader.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-container {
            background: #ffffff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            margin: 16px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #334155;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #f8fafc;
        }
        .btn-submit {
            width: 100%;
            background: #1a3c5e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="app-preloader">
        <div class="preloader-spinner"></div>
        <div class="preloader-text">Loading Home Inventory...</div>
    </div>

    <div class="login-container">
        <h2 style="margin: 0 0 4px 0; color: #1a3c5e;">Home Inventory</h2>
        <p style="margin: 0 0 24px 0; font-size: 14px; color: #64748b;">Store Management System</p>
        
        <form method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
        </form>
        <p style="margin-top: 20px; font-size: 12px; color: #94a3b8;">Contact your administrator if you need access.</p>
    </div>

    <!-- PWA Installation Modal Layout Framework -->
    <div id="pwaInstallModal" style="position: fixed !important; bottom: 16px !important; left: 16px !important; right: 16px !important; z-index: 999999 !important; background: #1a3c5e !important; color: white !important; padding: 16px !important; border-radius: 12px !important; box-shadow: 0 10px 25px rgba(0,0,0,0.3) !important; max-width: 400px !important; margin: 0 auto !important; display: none;">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
            <img src="/static/icons/icon-192.png" style="width: 48px; height: 48px; border-radius: 8px;">
            <div>
                <h3 style="margin: 0; font-size: 16px; font-weight: 600; color: white;">Install Home Inventory</h3>
                <p style="margin: 4px 0 0 0; font-size: 13px; color: #cbd5e1;">Install this app for quicker access and an app-like experience.</p>
            </div>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 8px;">
            <button id="btnCancel" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;">Later</button>
            <button id="btnInstall" style="background: #f59e0b; color: #0f172a; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px;">Install</button>
        </div>
    </div>

    <script>
        // 1. REGISTER SERVICE WORKER FOR STANDALONE ANDROID CONTAINER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered successfully:', reg.scope))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }

        window.addEventListener("load", function() {
            // Dismiss Preloader View
            const preloader = document.getElementById("app-preloader");
            if (preloader) {
                preloader.style.opacity = "0";
                setTimeout(() => preloader.remove(), 400);
            }

            // Universal Native PWA Event Orchestration Interceptor
            let deferredPrompt;
            const modal = document.getElementById('pwaInstallModal');
            const btnInstall = document.getElementById('btnInstall');
            const btnCancel = document.getElementById('btnCancel');

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                if (modal) {
                    modal.style.setProperty('display', 'block', 'important');
                }
            });

            if (btnInstall) {
                btnInstall.addEventListener('click', async () => {
                    if (!deferredPrompt) return;
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    deferredPrompt = null;
                    if (modal) modal.style.display = 'none';
                });
            }

            if (btnCancel) {
                btnCancel.addEventListener('click', () => {
                    if (modal) modal.style.display = 'none';
                });
            }
        });
    </script>
</body>
</html>
