{% load static %}
<!DOCTYPE html><html lang="en"><head>
    <link rel="stylesheet" href="/static/css/preloader.css"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sign In — Home Inventory</title><link rel="stylesheet" href="/static/css/main.css">    <link rel="manifest" href="{% static "manifest.json" %}">
    <meta name="theme-color" content="#1a3c5e">
</head>
<body><div class="login-page"><div class="login-card">
<div class="login-logo"><div class="logo-text">Home Inventory</div><div class="logo-sub">Store Management System</div></div>
{% if error %}<div class="alert alert-error"><span>❌</span><span>{{ error }}</span></div>{% endif %}
<form method="post"><div class="form-group"><label class="form-label">Username</label><input type="text" name="username" id="id_username" class="form-control" value="{{ username or '' }}" autofocus required></div>
<div class="form-group"><label class="form-label">Password</label><input type="password" name="password" id="id_password" class="form-control" required></div>
<button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">Sign In</button>
</form>
<p style="text-align:center;margin-top:20px;font-size:12px;color:var(--grey);">Contact your administrator if you need access.</p>
</div></div>
    <div id="pwaInstallModal" class="pwa-install-modal fixed bottom-4 left-4 right-4 md:bottom-6 md:right-6 md:left-auto max-w-sm hidden">
        <div class="pwa-install-card">
            <img src="{% static "icons/icon-192.png" %}" class="pwa-icon">
            <h2>Install Home Inventory</h2>
            <p>Install this app for quicker access and an app-like experience.</p>
            <div class="pwa-buttons">
                <button id="btnInstall" class="pwa-btn install">Install</button>
                <button id="btnCancel" class="pwa-btn cancel">Later</button>
            </div>
        </div>
    </div>
    <script src="/static/js/pwa-install.js" defer></script>
</body></html>
