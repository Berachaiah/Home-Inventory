{% extends "base.html" %}
{% block page_title %}AI Agent{% endblock %}
{% block content %}
<div class="agent-page">
  <div id="agent-empty" class="agent-empty">
    <div class="agent-hero-avatar">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" fill="#fff"/>
        <rect x="6" y="13" width="12" height="8" rx="3" fill="#fff"/>
        <circle cx="9" cy="7.5" r="1.2" fill="#1a3c5e"/>
        <circle cx="15" cy="7.5" r="1.2" fill="#1a3c5e"/>
        <path d="M9 10.5 Q12 12 15 10.5" stroke="#1a3c5e" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <h1>Hi {{ user.first_name or user.username }}, what do you need from the store?</h1>
    <p>Ask about stock levels, expiring items, restocks, or recent withdrawals.</p>
    <div class="agent-chips">
      <button class="agent-chip" data-msg="What's low?">📉 What's low?</button>
      <button class="agent-chip" data-msg="What's expiring?">⏳ What's expiring?</button>
      <button class="agent-chip" data-msg="Restock summary">🛍️ Restock summary</button>
      <button class="agent-chip" data-msg="Recent withdrawals">📋 Recent withdrawals</button>
    </div>
  </div>

  <div id="agent-thread" class="agent-thread"></div>

  <div class="agent-composer-wrap">
    <div class="agent-composer">
      <textarea id="agent-input" placeholder="Message the inventory assistant…" rows="1"></textarea>
      <button id="agent-send" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 12L20 4L13 20L11 13L4 12Z" fill="currentColor"/></svg>
      </button>
    </div>
  </div>
</div>

<style>
.agent-page{display:flex;flex-direction:column;height:calc(100vh - 65px);margin:-28px;position:relative;background:var(--white);}
.agent-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.agent-empty.hidden{display:none;}
.agent-hero-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#0f2540,#1a3c5e);display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
.agent-empty h1{font-family:'Instrument Serif',serif;font-size:26px;color:var(--navy-dark);font-weight:400;max-width:480px;line-height:1.3;}
.agent-empty p{color:var(--grey);font-size:13.5px;margin-top:8px;}
.agent-chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:22px;max-width:520px;}
.agent-chip{background:var(--white);border:1.5px solid var(--border);padding:9px 16px;border-radius:20px;font-size:13px;font-weight:500;color:#334155;cursor:pointer;transition:all .15s;font-family:inherit;}
.agent-chip:hover{border-color:var(--navy);background:rgba(26,60,94,0.04);}

.agent-thread{flex:1;overflow-y:auto;padding:28px 20px 12px;display:none;flex-direction:column;gap:18px;}
.agent-thread.active{display:flex;}
.agent-msg{display:flex;gap:12px;max-width:720px;width:100%;margin:0 auto;}
.agent-msg.user{flex-direction:row-reverse;}
.agent-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.agent-avatar.bot{background:linear-gradient(135deg,#0f2540,#1a3c5e);}
.agent-avatar.user{background:var(--accent);color:var(--navy-dark);}
.agent-bubble{padding:11px 16px;border-radius:14px;font-size:14px;line-height:1.6;max-width:78%;}
.agent-msg.bot .agent-bubble{background:#f4f6f9;color:#1e293b;border-bottom-left-radius:4px;}
.agent-msg.user .agent-bubble{background:var(--navy);color:#fff;border-bottom-right-radius:4px;}
.agent-bubble p{margin:0 0 8px;}
.agent-bubble p:last-child{margin-bottom:0;}
.typing-dots{display:flex;gap:4px;padding:4px 0;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:#94a3b8;animation:tdot 1.2s infinite ease-in-out;}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes tdot{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}

.pending-card{margin-top:10px;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;}
.pending-card .pc-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--accent);margin-bottom:6px;}
.pending-card .pc-actions{display:flex;gap:8px;margin-top:10px;}
.pending-card button{border:none;border-radius:7px;padding:7px 14px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;}
.pc-confirm{background:var(--green);color:#fff;}
.pc-cancel{background:#f1f5f9;color:#334155;}
.pending-card.resolved{opacity:.6;}

.agent-composer-wrap{border-top:1px solid var(--border);padding:14px 20px 20px;background:var(--white);}
.agent-composer{max-width:720px;margin:0 auto;display:flex;align-items:flex-end;gap:10px;background:#f4f6f9;border:1.5px solid var(--border);border-radius:20px;padding:8px 8px 8px 16px;transition:border-color .15s;}
.agent-composer:focus-within{border-color:var(--navy);}
.agent-composer textarea{flex:1;border:none;background:transparent;resize:none;outline:none;font-family:inherit;font-size:14px;line-height:1.5;max-height:140px;padding:6px 0;}
.agent-composer button{width:34px;height:34px;border-radius:50%;background:var(--navy);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s;}
.agent-composer button:hover{background:var(--navy-light);}
.agent-composer button:disabled{background:#cbd5e1;cursor:default;}
@media(max-width:768px){.agent-page{height:calc(100vh - 60px);margin:-16px;}}
</style>

<script>
(function(){
  const emptyEl = document.getElementById('agent-empty');
  const threadEl = document.getElementById('agent-thread');
  const inputEl = document.getElementById('agent-input');
  const sendBtn = document.getElementById('agent-send');
  let history = [];

  function scrollBottom(){ threadEl.scrollTop = threadEl.scrollHeight; }

  function escapeHtml(s){
    return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  }

  function renderText(text){
    return escapeHtml(text).split(/\n{2,}/).map(p => '<p>' + p.replace(/\n/g,'<br>') + '</p>').join('');
  }

  function addMessage(role, text){
    if (!threadEl.classList.contains('active')){
      emptyEl.classList.add('hidden');
      threadEl.classList.add('active');
    }
    const wrap = document.createElement('div');
    wrap.className = 'agent-msg ' + role;
    const avatarLetter = role === 'user' ? '{{ (user.first_name or user.username)[0]|upper }}' : '';
    wrap.innerHTML =
      '<div class="agent-avatar ' + role + '">' + (role === 'user' ? avatarLetter : '🤖') + '</div>' +
      '<div class="agent-bubble">' + renderText(text) + '</div>';
    threadEl.appendChild(wrap);
    scrollBottom();
    return wrap.querySelector('.agent-bubble');
  }

  function addTyping(){
    const wrap = document.createElement('div');
    wrap.className = 'agent-msg bot';
    wrap.innerHTML = '<div class="agent-avatar bot">🤖</div><div class="agent-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
    threadEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function addPendingCard(bubbleEl, pending){
    const card = document.createElement('div');
    card.className = 'pending-card';
    card.innerHTML =
      '<div class="pc-title">Needs confirmation</div>' +
      '<div>' + escapeHtml(pending.description) + '</div>' +
      '<div class="pc-actions"><button class="pc-confirm">Confirm</button><button class="pc-cancel">Cancel</button></div>';
    bubbleEl.appendChild(card);
    card.querySelector('.pc-confirm').addEventListener('click', async () => {
      card.classList.add('resolved');
      card.querySelectorAll('button').forEach(b => b.disabled = true);
      try {
        const res = await fetch('/api/assistant/execute', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({action_type: pending.action_type, params: pending.params})
        });
        const data = await res.json();
        addMessage('bot', res.ok ? 'Done — that action was completed.' : (data.detail || 'Something went wrong.'));
      } catch (e) {
        addMessage('bot', 'Network error while executing that action.');
      }
    });
    card.querySelector('.pc-cancel').addEventListener('click', () => {
      card.classList.add('resolved');
      card.querySelectorAll('button').forEach(b => b.disabled = true);
      addMessage('bot', 'Okay, cancelled — nothing was changed.');
    });
    scrollBottom();
  }

  async function send(text){
    text = text.trim();
    if (!text) return;
    addMessage('user', text);
    history.push({role: 'user', content: text});
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    const typingWrap = addTyping();

    try {
      const res = await fetch('/api/assistant/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: text, history: history.slice(-6)})
      });
      const data = await res.json();
      typingWrap.remove();

      const reply = data.reply || "I couldn't put together an answer for that — try rephrasing?";
      const bubble = addMessage('bot', reply);
      history.push({role: 'assistant', content: reply});
      if (history.length > 20) history = history.slice(-20);

      if (data.pending_action) {
        addPendingCard(bubble, data.pending_action);
      }
    } catch (e) {
      typingWrap.remove();
      addMessage('bot', "Couldn't reach the assistant — check your connection and try again.");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', () => send(inputEl.value));
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      send(inputEl.value);
    }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });
  document.querySelectorAll('.agent-chip').forEach(chip => {
    chip.addEventListener('click', () => send(chip.dataset.msg));
  });
})();
</script>
{% endblock %}
