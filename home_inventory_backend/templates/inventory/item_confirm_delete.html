{% extends 'base.html' %}
{% block title %}Delete {{ item }}{% endblock %}
{% block page_title %}Delete Item{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;"><div class="card-body" style="text-align:center;padding:40px;">
  <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
  <h2 style="margin-bottom:8px;">Delete "{{ item }}"?</h2>
  <p class="text-muted mb-3">This will delete the item and all its batches. Withdrawal records remain.</p>
  <form method="post"><div class="flex-gap" style="justify-content:center;">
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{{ url_for('item_detail', item.id) }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div></div>
{% endblock %}
